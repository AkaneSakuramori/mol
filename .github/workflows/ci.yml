name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install llvmlite

      - name: Report platform
        run: python src/ulang.py doctor

      - name: Run test suite
        run: python tests/run_all.py

  native-build:
    name: native build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install llvmlite

      - name: Set up C compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Build and run a native binary
        run: python src/ulang.py build examples/native/fib.ul -o build_fib
        shell: bash

      - name: Execute the binary (Unix)
        if: runner.os != 'Windows'
        run: ./build_fib

      - name: Execute the binary (Windows)
        if: runner.os == 'Windows'
        run: ./build_fib.exe
